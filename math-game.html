<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        #startButton {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }
        #startButton:hover {
            background-color: #45a049;
        }
        #gameArea {
            display: none;
            text-align: center;
        }
        #answerInput {
            padding: 10px;
            font-size: 16px;
            margin-top: 20px;
            width: 200px;
        }
        #result {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <button id="startButton">Are you ready to start?</button>
    <div id="gameArea">
        <input type="text" id="answerInput" placeholder="Enter your answer" autocomplete="off">
        <div id="result"></div>
    </div>

    <script>
        const startButton = document.getElementById('startButton');
        const gameArea = document.getElementById('gameArea');
        const answerInput = document.getElementById('answerInput');
        const resultDiv = document.getElementById('result');
        let score = 0;
        let isGameRunning = false;
        let gameTimeout;

        // Function to generate a random 3-digit number
        function getRandomNumber() {
            return Math.floor(Math.random() * 900) + 100; // 100 to 999
        }

        // Function to generate a math problem (addition or subtraction)
        function generateProblem() {
            const num1 = getRandomNumber();
            const num2 = getRandomNumber();
            const isAddition = Math.random() > 0.5;
            const operator = isAddition ? '+' : '-';
            const answer = isAddition ? num1 + num2 : num1 - num2;
            return { question: `${num1} ${operator} ${num2}`, answer };
        }

        // Function to speak the math problem
        function speakProblem(question) {
            const utterance = new SpeechSynthesisUtterance(question);
            utterance.rate = 1.2; // Slightly faster for clarity
            window.speechSynthesis.speak(utterance);
        }

        // Function to start the game
        function startGame() {
            if (isGameRunning) return;
            isGameRunning = true;
            score = 0;
            startButton.style.display = 'none';
            gameArea.style.display = 'block';
            answerInput.value = '';
            answerInput.focus();
            resultDiv.textContent = '';

            let currentProblem = generateProblem();
            speakProblem(currentProblem.question);

            // Handle answer submission
            answerInput.addEventListener('keydown', function handler(event) {
                if (event.key === 'Enter') {
                    const userAnswer = parseInt(answerInput.value);
                    if (userAnswer === currentProblem.answer) {
                        score++;
                    }
                    answerInput.value = '';
                    currentProblem = generateProblem();
                    speakProblem(currentProblem.question);
                }
            });

            // End game after 60 seconds
            gameTimeout = setTimeout(() => {
                isGameRunning = false;
                gameArea.style.display = 'none';
                startButton.style.display = 'block';
                resultDiv.textContent = `Game Over! Your score: ${score}`;
                answerInput.removeEventListener('keydown', handler); // Clean up
                window.speechSynthesis.cancel(); // Stop any ongoing speech
            }, 60000);
        }

        // Start button click event
        startButton.addEventListener('click', startGame);
    </script>
</body>
</html>
