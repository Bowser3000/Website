<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Game</title>
    <style>
        /* Minimal styling for barebones look */
        body {
            margin: 10px;
            padding: 0;
        }
        #gameArea, #highScores {
            margin-top: 10px;
        }
        #answerInput {
            width: 100%;
            max-width: 200px; /* Prevent overflow on small screens */
        }
        #replayAudioButton:disabled {
            /* Minimal visual cue for disabled state */
            opacity: 0.5;
        }
        /* Ensure no horizontal scrolling on iPhone */
        img, input, button, div {
            max-width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <button id="startButton">Are you ready to start?</button>
    <div id="gameArea">
        <div id="scoreCounter">Correct: 0</div>
        <div id="timer">Time: 60s</div>
        <input type="text" id="answerInput" placeholder="Enter your answer" autocomplete="off">
        <button id="replayAudioButton" disabled>Replay Audio</button>
        <button id="homeButton">Back to Home</button>
        <div id="result"></div>
        <div id="error"></div>
    </div>
    <div id="highScores">
        <h3>High Scores</h3>
        <ul id="highScoreList"></ul>
    </div>

    <script>
        const startButton = document.getElementById('startButton');
        const replayAudioButton = document.getElementById('replayAudioButton');
        const homeButton = document.getElementById('homeButton');
        const gameArea = document.getElementById('gameArea');
        const answerInput = document.getElementById('answerInput');
        const resultDiv = document.getElementById('result');
        const scoreCounter = document.getElementById('scoreCounter');
        const timerDiv = document.getElementById('timer');
        const errorDiv = document.getElementById('error');
        const highScoreList = document.getElementById('highScoreList');
        let score = 0;
        let isGameRunning = false;
        let gameTimeout;
        let timerInterval;
        let timeLeft = 60;
        let currentProblem = null;

        // Load high scores from localStorage
        function loadHighScores() {
            const highScores = JSON.parse(localStorage.getItem('highScores')) || [];
            highScoreList.innerHTML = '';
            highScores.forEach((score, index) => {
                const li = document.createElement('li');
                li.textContent = `#${index + 1}: ${score}`;
                highScoreList.appendChild(li);
            });
        }

        // Save high score to localStorage
        function saveHighScore(score) {
            const highScores = JSON.parse(localStorage.getItem('highScores')) || [];
            highScores.push(score);
            highScores.sort((a, b) => b - a); // Sort descending
            highScores.splice(5); // Keep top 5 scores
            localStorage.setItem('highScores', JSON.stringify(highScores));
            loadHighScores();
        }

        // Function to show error message
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.textContent = '';
                errorDiv.style.display = 'none';
            }, 3000);
        }

        // Function to stop the game
        function stopGame() {
            if (!isGameRunning) return;
            isGameRunning = false;
            clearTimeout(gameTimeout);
            clearInterval(timerInterval);
            window.speechSynthesis.cancel();
            gameArea.style.display = 'none';
            startButton.style.display = 'block';
            replayAudioButton.style.display = 'none';
            homeButton.style.display = 'block';
            resultDiv.textContent = `Game Stopped! Your score: ${score}`;
            saveHighScore(score);
            answerInput.removeEventListener('keydown', handleAnswer);
        }

        // Function to generate a random 3-digit number
        function getRandomNumber() {
            return Math.floor(Math.random() * 900) + 100; // 100 to 999
        }

        // Function to generate a math problem
        function generateProblem() {
            const num1 = getRandomNumber();
            const num2 = getRandomNumber();
            const isAddition = Math.random() > 0.5;
            const operator = isAddition ? '+' : '-';
            const firstNum = isAddition ? num1 : Math.max(num1, num2);
            const secondNum = isAddition ? num2 : Math.min(num1, num2);
            const answer = isAddition ? firstNum + secondNum : firstNum - secondNum;
            const spokenOperator = isAddition ? 'add' : 'minus';
            return { 
                question: `${firstNum} ${operator} ${secondNum}`, 
                spokenQuestion: `${firstNum} ${spokenOperator} ${secondNum}`, 
                answer 
            };
        }

        // Function to speak the math problem
        function speakProblem(spokenQuestion) {
            try {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(spokenQuestion);
                utterance.rate = 0.9; // Slower speech rate
                replayAudioButton.disabled = true; // Disable button during speech
                utterance.onend = () => {
                    replayAudioButton.disabled = false; // Enable button after speech
                };
                utterance.onerror = (event) => {
                    showError('Speech synthesis failed. Please check your browser settings.');
                    replayAudioButton.disabled = false; // Enable in case of error
                };
                window.speechSynthesis.speak(utterance);
            } catch (e) {
                showError('Speech synthesis is not supported in this browser.');
                replayAudioButton.disabled = false;
            }
        }

        // Function to update the timer
        function updateTimer() {
            timeLeft--;
            timerDiv.textContent = `Time: ${timeLeft}s`;
            if (timeLeft <= 0) {
                stopGame();
                resultDiv.textContent = `Game Over! Your score: ${score}`;
            }
        }

        // Function to start the game
        function startGame() {
            if (isGameRunning) return;
            isGameRunning = true;
            score = 0;
            timeLeft = 60;
            startButton.style.display = 'none';
            gameArea.style.display = 'block';
            replayAudioButton.style.display = 'block';
            homeButton.style.display = 'block';
            answerInput.value = '';
            answerInput.focus();
            resultDiv.textContent = '';
            scoreCounter.textContent = 'Correct: 0';
            timerDiv.textContent = 'Time: 60s';
            errorDiv.textContent = '';
            errorDiv.style.display = 'none';

            currentProblem = generateProblem();
            speakProblem(currentProblem.spokenQuestion);

            // Start timer
            timerInterval = setInterval(updateTimer, 1000);

            // Define answer handler
            function handleAnswer(event) {
                if (event.key === 'Enter') {
                    const userAnswer = parseInt(answerInput.value);
                    if (!isNaN(userAnswer)) {
                        if (userAnswer === currentProblem.answer) {
                            score++;
                            resultDiv.textContent = 'Correct!';
                            scoreCounter.textContent = `Correct: ${score}`;
                        } else {
                            resultDiv.textContent = 'Wrong!';
                        }
                        setTimeout(() => {
                            resultDiv.textContent = '';
                        }, 1000);
                        answerInput.value = '';
                        currentProblem = generateProblem();
                        speakProblem(currentProblem.spokenQuestion);
                    } else {
                        showError('Please enter a valid number.');
                    }
                }
            }

            // Add answer event listener
            answerInput.addEventListener('keydown', handleAnswer);

            // Replay audio button
            replayAudioButton.addEventListener('click', () => {
                if (currentProblem && isGameRunning && !replayAudioButton.disabled) {
                    speakProblem(currentProblem.spokenQuestion);
                }
            });

            // End game after 60 seconds
            gameTimeout = setTimeout(() => {
                stopGame();
                resultDiv.textContent = `Game Over! Your score: ${score}`;
            }, 60000);
        }

        // Start button click event
        try {
            startButton.addEventListener('click', startGame);
            homeButton.addEventListener('click', () => {
                stopGame();
                window.location.href = 'index.html';
            });
            loadHighScores(); // Load high scores on page load
        } catch (e) {
            console.error('Failed to add button listeners:', e);
            showError('Failed to initialize the game. Please refresh the page.');
        }

        // Log errors to console for debugging
        window.onerror = function (message, source, lineno, colno, error) {
            console.error(`Script Error: ${message} at ${source}:${lineno}:${colno}`);
            showError('An error occurred. Please try again or check your browser console.');
        };
    </script>
</body>
</html>
