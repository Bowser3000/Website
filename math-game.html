<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        #startButton, #replayAudioButton {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            margin: 10px;
        }
        #startButton:hover, #replayAudioButton:hover {
            background-color: #45a049;
        }
        #replayAudioButton {
            display: none;
        }
        #gameArea {
            display: none;
            text-align: center;
        }
        #answerInput {
            padding: 10px;
            font-size: 16px;
            margin-top: 20px;
            width: 200px;
        }
        #result, #scoreCounter, #timer {
            margin-top: 20px;
            font-size: 20px;
        }
        #result.correct {
            color: green;
        }
        #result.wrong {
            color: red;
        }
        #error {
            color: red;
            margin-top: 20px;
            font-size: 16px;
            display: none;
        }
    </style>
</head>
<body>
    <button id="startButton">Are you ready to start?</button>
    <div id="gameArea">
        <div id="scoreCounter">Correct: 0</div>
        <div id="timer">Time: 60s</div>
        <input type="text" id="answerInput" placeholder="Enter your answer" autocomplete="off">
        <button id="replayAudioButton">Replay Audio</button>
        <div id="result"></div>
        <div id="error"></div>
    </div>

    <script>
        const startButton = document.getElementById('startButton');
        const replayAudioButton = document.getElementById('replayAudioButton');
        const gameArea = document.getElementById('gameArea');
        const answerInput = document.getElementById('answerInput');
        const resultDiv = document.getElementById('result');
        const scoreCounter = document.getElementById('scoreCounter');
        const timerDiv = document.getElementById('timer');
        const errorDiv = document.getElementById('error');
        let score = 0;
        let isGameRunning = false;
        let gameTimeout;
        let timerInterval;
        let timeLeft = 60;
        let currentProblem = null;

        // Function to show error message
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.textContent = '';
                errorDiv.style.display = 'none';
            }, 3000);
        }

        // Function to generate a random 3-digit number
        function getRandomNumber() {
            return Math.floor(Math.random() * 900) + 100; // 100 to 999
        }

        // Function to generate a math problem
        function generateProblem() {
            const num1 = getRandomNumber();
            const num2 = getRandomNumber();
            const isAddition = Math.random() > 0.5;
            const operator = isAddition ? '+' : '-';
            // Ensure no negative answers for subtraction
            const firstNum = isAddition ? num1 : Math.max(num1, num2);
            const secondNum = isAddition ? num2 : Math.min(num1, num2);
            const answer = isAddition ? firstNum + secondNum : firstNum - secondNum;
            const spokenOperator = isAddition ? 'add' : 'minus';
            return { 
                question: `${firstNum} ${operator} ${secondNum}`, 
                spokenQuestion: `${firstNum} ${spokenOperator} ${secondNum}`, 
                answer 
            };
        }

        // Function to speak the math problem
        function speakProblem(spokenQuestion) {
            try {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(spokenQuestion);
                utterance.rate = 0.9; // Slower speech rate
                utterance.onerror = (event) => {
                    showError('Speech synthesis failed. Please check your browser settings.');
                };
                window.speechSynthesis.speak(utterance);
            } catch (e) {
                showError('Speech synthesis is not supported in this browser.');
            }
        }

        // Function to update the timer
        function updateTimer() {
            timeLeft--;
            timerDiv.textContent = `Time: ${timeLeft}s`;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
            }
        }

        // Function to start the game
        function startGame() {
            if (isGameRunning) return;
            isGameRunning = true;
            score = 0;
            timeLeft = 60;
            startButton.style.display = 'none';
            gameArea.style.display = 'block';
            replayAudioButton.style.display = 'block';
            answerInput.value = '';
            answerInput.focus();
            resultDiv.textContent = '';
            scoreCounter.textContent = 'Correct: 0';
            timerDiv.textContent = 'Time: 60s';
            errorDiv.textContent = '';
            errorDiv.style.display = 'none';

            currentProblem = generateProblem();
            speakProblem(currentProblem.spokenQuestion);

            // Start timer
            timerInterval = setInterval(updateTimer, 1000);

            // Define answer handler
            function handleAnswer(event) {
                if (event.key === 'Enter') {
                    const userAnswer = parseInt(answerInput.value);
                    if (!isNaN(userAnswer)) {
                        if (userAnswer === currentProblem.answer) {
                            score++;
                            resultDiv.textContent = 'Correct!';
                            resultDiv.className = 'correct';
                            scoreCounter.textContent = `Correct: ${score}`;
                        } else {
                            resultDiv.textContent = 'Wrong!';
                            resultDiv.className = 'wrong';
                        }
                        setTimeout(() => {
                            resultDiv.textContent = '';
                            resultDiv.className = '';
                        }, 1000);
                        answerInput.value = '';
                        currentProblem = generateProblem();
                        speakProblem(currentProblem.spokenQuestion);
                    } else {
                        showError('Please enter a valid number.');
                    }
                }
            }

            // Add answer event listener
            answerInput.addEventListener('keydown', handleAnswer);

            // Replay audio button
            replayAudioButton.addEventListener('click', () => {
                if (currentProblem && isGameRunning) {
                    speakProblem(currentProblem.spokenQuestion);
                }
            });

            // End game after 60 seconds
            gameTimeout = setTimeout(() => {
                isGameRunning = false;
                gameArea.style.display = 'none';
                startButton.style.display = 'block';
                replayAudioButton.style.display = 'none';
                resultDiv.textContent = `Game Over! Your score: ${score}`;
                resultDiv.className = '';
                answerInput.removeEventListener('keydown', handleAnswer);
                window.speechSynthesis.cancel();
                clearInterval(timerInterval);
            }, 60000);
        }

        // Start button click event
        try {
            startButton.addEventListener('click', startGame);
        } catch (e) {
            console.error('Failed to add start button listener:', e);
            showError('Failed to initialize the game. Please refresh the page.');
        }

        // Log errors to console for debugging
        window.onerror = function (message, source, lineno, colno, error) {
            console.error(`Script Error: ${message} at ${source}:${lineno}:${colno}`);
            showError('An error occurred. Please try again or check your browser console.');
        };
    </script>
</body>
</html>
