<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <style>
        /* Ensure the page is responsive and fits iPhone screens */
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            box-sizing: border-box;
        }

        /* Container for each image and caption */
        .image-container {
            margin-bottom: 20px; /* Space between images */
            text-align: center; /* Center captions */
        }

        /* Make images responsive to fit screen width */
        img {
            max-width: 100%; /* Prevent images from exceeding container width */
            height: auto; /* Maintain aspect ratio */
            display: block; /* Remove inline spacing issues */
            margin: 0 auto; /* Center images */
        }

        /* Style for captions */
        .caption {
            font-size: 16px;
            color: #333;
            margin-top: 10px;
        }

        /* Style for the back link */
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <!-- Image 1 -->
    <div class="image-container">
        <img src="images/placeholder1.jpg" alt="Placeholder image 1">
        <p class="caption">Dummy caption for image 1</p>
    </div>

    <!-- Image 2 -->
